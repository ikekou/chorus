<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multi LLM Chat</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #6b7280;
        --border: #d1d5db;
        --accent: #4f46e5;
        --accent-fg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1f2023;
          --fg: #f3f4f6;
          --muted: #9ca3af;
          --border: #3f4147;
          --accent: #6366f1;
        }
      }
      * { box-sizing: border-box; }
      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
        font-weight: 600;
      }
      textarea {
        width: 100%;
        min-height: 110px;
        resize: vertical;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 1.5;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--bg);
        color: var(--fg);
      }
      textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }
      .providers {
        display: flex;
        gap: 6px;
        margin: 10px 0;
      }
      .provider {
        flex: 1;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }
      .provider input { margin: 0; cursor: pointer; }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      button.send {
        flex: 1;
        padding: 9px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent-fg);
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      button.send:disabled { opacity: 0.5; cursor: not-allowed; }
      .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }
      kbd {
        font-family: inherit;
        font-size: 10px;
        padding: 1px 5px;
        border: 1px solid var(--border);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Multi LLM Chat</h1>
    <textarea id="prompt" placeholder="プロンプトを入力して送信…"></textarea>
    <div class="providers" id="providers"></div>
    <div class="row">
      <button class="send" id="send">まとめて送信</button>
    </div>
    <p class="hint"><kbd>⌘</kbd> + <kbd>Enter</kbd> でも送信できます。</p>
    <script type="module" src="popup.js"></script>
  </body>
</html>
